# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Janis Koзҡ„дёӘдәәж ‘жҙһ
email: enzogko@outlook.com
description: >- # this means to ignore newlines until "baseurl:"
  Only a personal blog, nothing more.
twitter_username: KitJanis7764
github_username: CharliiKo
minimal_mistakes_skin: "mint"
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes@4.27.3
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: Asia/Hong_Kong

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Janis Ko"
  avatar : "/assets/images/Atomu.jpg"
  bio    : "  жҲ‘еҸӘжғіжӮ жӮ иҚЎиҚЎең°иҝҮеҘҪжҜҸдёҖеӨ©пјҢ\nдё–дёҠзҡ„з—ӣиӢҰеҶҚд№ҹдёҚи§ҒгҖӮ\nRights for everyone, and freedom for everyone.рҹҸіпёҸвҖҚрҹҢҲвҳӮпёҸ"
  links:
    - label: "My Website"
      icon: "fas fa-fw fa-link"
      url: "https://CharliiKo.github.io"
    - label: "@KitJanis7764"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/KitJanis7764"
    - label: "@CharliiKo"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/CharliiKo"
    - label: "@kitJanis7764"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/kitJanis7764"

footer:
  links:
    - label: "@KitJanis7764"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/KitJanis7764"
    - label: "@CharliiKo"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/CharliiKo"
    - label: "@kitJanis7764"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/kitJanis7764"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
